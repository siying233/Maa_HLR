name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [win, macos]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: bash
        run: |
          rm -rf MFA/runtimes

      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os == 'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFAAvalonia."

      - name: Install
        shell: bash
        run: |
          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }}
          cd ..

          if [ -d "MFA" ] && [ "${{ matrix.os }}" != "android" ]; then
            echo "Copying MFA files to install directory..."
            mkdir -p install
            rsync -av --ignore-existing MFA/ install/
          else
            echo "MFA directory not found, skipping copy."
          fi
          if [[ "${{ matrix.os }}" == "win" ]]; then
            mkdir -p install
            cp -v "tools/DependencySetup_依赖库安装.bat" install/
          fi

      # Windows x64：在 Windows runner 上换 exe 图标（见 package_win_exe_icon）；此处上传中间产物
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        with:
          name: Maa_HLR-${{ matrix.os }}-${{ matrix.arch }}-for-exe-icon
          path: "install"

      - uses: actions/upload-artifact@v4
        if: matrix.os != 'win' || matrix.arch != 'x86_64'
        with:
          name: Maa_HLR-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  # 使用 assets/logo.png 生成 ICO，并用 rcedit 写入 MFAAvalonia 主程序（如 Avalonia.exe）
  package_win_exe_icon:
    needs: [meta, install]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download staged Windows x64 build
        uses: actions/download-artifact@v4
        with:
          name: Maa_HLR-win-x86_64-for-exe-icon
          path: install

      - name: Set exe icon from logo
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f assets/logo.png ]]; then
            echo "请提交 assets/logo.png（方形 PNG），用于 Windows 可执行文件图标。"
            exit 1
          fi
          choco install imagemagick -y
          for size in 512 256 128 64 48 32 24 16; do
            magick assets/logo.png -resize ${size}x${size} icon-${size}.png
          done
          magick icon-512.png icon-256.png icon-128.png icon-64.png icon-48.png icon-32.png icon-24.png icon-16.png maa_hlr.ico
          curl -L https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe
          if [[ -f install/Avalonia.exe ]]; then
            EXE="install/Avalonia.exe"
          elif [[ -f install/MFAAvalonia.exe ]]; then
            EXE="install/MFAAvalonia.exe"
          else
            EXE=$(find install -maxdepth 1 -name '*.exe' -type f | head -1)
          fi
          if [[ -z "${EXE:-}" ]]; then
            echo "install 目录下未找到 .exe"; ls -la install; exit 1
          fi
          ./rcedit.exe "$EXE" --set-icon "maa_hlr.ico"
          echo "Icon applied to: $EXE"

      - uses: actions/upload-artifact@v4
        with:
          name: Maa_HLR-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            case "$f" in *-for-exe-icon) continue ;; esac
            (cd "$f" && zip -r "../$f-${{ needs.meta.outputs.tag }}.zip" .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
